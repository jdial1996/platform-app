name: Build and Push Docker Image to an ECR Repository 

on: push 

jobs: 
  build:
    runs-on: ubuntu-latest 
  # Have to set to enable OIDC
    permissions:
      id-token: write 
      contents: read 

    steps: 
    - name: Checkout Code 
      uses: actions/checkout@v2
    # - name: Install Dependencies
    #   run: |  
    #     pip3 install flake8 
    # - name: Static Code Analysis  
    #   run: |
    #     echo "Running flake8 linting checks...."
    #     flake8 .
    - name: Build Docker Image
      run: |
        docker build -t platform-app:${{ github.sha }} ./app
    # - name: Run Trivy vulnerability scanner
    #   uses: aquasecurity/trivy-action@master
    #   with:
    #     image-ref: 'platform-app:${{ github.sha }}'
    #     format: 'table'
    #     exit-code: '1'
    #     ignore-unfixed: true
    #     vuln-type: 'os,library'
    #     severity: 'CRITICAL,HIGH'
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::355285117207:role/github-oidc-role-rw
        role-duration-seconds: 1000
        aws-region: eu-west-1
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    - name: Build, tag, and push docker image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: platform-app
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker tag platform-app:${{ github.sha }} $REGISTRY/$REPOSITORY:$IMAGE_TAG
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

    # deploy
    - name: Setup Terraform 
      uses: hashicorp/setup-terraform@v2

    - name: Terraform init
      run: | 
        cd deploy && terraform init 
    
    - name: Terraform plan
      run: | 
        cd deploy && terraform plan -var image_tag=${{ github.sha }}

    - name: Terraform apply 
      run: |
        cd deploy && terraform apply -var image_tag=${{ github.sha }} --auto-approve


